<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS CTF | Login</title>
    <!-- Legătura către fișierul tău CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <!-- Header -->
    <header class="navbar">
      <a href="index.html" class="logo flex-logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                <polyline points="9 10 12 13 9 16"></polyline>
                <line x1="14" y1="16" x2="17" y2="16"></line>
            </svg>
            OS-CTF
        </a>
        <nav>
            <ul class="nav-links">
                <li><a href="despre.html">Despre</a></li>
                <li><a href="reguli.html">Reguli</a></li>
            </ul>
        </nav>
    </header>

    <!-- Conținut Principal -->
    <main class="hero-section">
        
        <!-- Icon simplu -->
        <div class="icon-circle">
           <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <!-- Conturul Scutului -->
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                <!-- Săgeata de la terminal ( > ) -->
                <polyline points="9 10 12 13 9 16"></polyline>
                <!-- Liniuța de la terminal ( _ ) -->
                <line x1="13" y1="16" x2="16" y2="16"></line>
            </svg>
        </div>

        <h1 class="title">Sisteme de Operare: Capture The Flag</h1>
        <p class="subtitle">Aprofundează conceptele de administrare Linux. Rezolvă scenariile practice și capturează flag-urile.</p>
        
        <!-- Caseta de Autentificare -->
        <div class="login-box">
            <h2>Acces Platforma</h2>
            
            <!-- MODIFICAT AICI: Am scos action=".." și am adăugat id="login-form" -->
            <form id="login-form" class="login-form">
                <input type="text" name="username" placeholder="Nume utilizator" required class="input-field">
                <input type="password" name="password" placeholder="Parolă" required class="input-field">
                <div class="form-actions">
                    <button type="submit" name="action" value="login" class="btn-primary">Log In</button>
                    <button type="submit" name="action" value="register" class="btn-secondary">Register</button>
                </div>
            </form>
        </div>

    </main>

   
    <script src="js/main.js"></script>
</body>
</html>
